name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Java (using 17, standard for modern apps)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Grant permissions & run the build tool
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # 3. Smart upload (Finds the APK no matter where Gradle drops it)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
